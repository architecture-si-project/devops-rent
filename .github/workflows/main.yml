name: CI - Docker Build

on:
    push:
        branches: [ main, develop ]
    pull_request:
        branches: [ main, develop ]

permissions:
    contents: read
    actions: read
    security-events: write
    checks: write

jobs:
    build-and-test:
        runs-on: ubuntu-latest
        timeout-minutes: 30

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Set up JDK
              uses: actions/setup-java@v4
              with:
                  distribution: 'temurin'
                  java-version: '21'
            - name: Make gradlew executable
              working-directory: .
              run: chmod +x gradlew

            - name: Run tests
              working-directory: .
              run: ./gradlew test

            - name: Build Docker images
              run: |
                  docker build -t myservice:latest .
            
